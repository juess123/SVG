  <text x="542.00" y="283.68" font-family="Microsoft JhengHei, Microsoft YaHei, Noto Sans SC, Noto Sans CJK SC, SimHei, Arial, sans-serif" font-size="68.08" font-weight="800" fill="#bf9975" textLength="306.00" lengthAdjust="spacing">文化润疆</text>
  <text x="683.00" y="367.60" font-family="Microsoft JhengHei, Microsoft YaHei, Noto Sans SC, Noto Sans CJK SC, SimHei, Arial, sans-serif" font-size="27.60" font-weight="800" fill="#bf242b" textLength="555.00" lengthAdjust="spacing">开展“丽水三宝”临展、丽新书画联</text>
  <text x="226.00" y="366.96" font-family="Microsoft JhengHei, Microsoft YaHei, Noto Sans SC, Noto Sans CJK SC, SimHei, Arial, sans-serif" font-size="25.76" font-weight="800" fill="#c62c2e" textLength="26.00" lengthAdjust="spacing">刀</text>
